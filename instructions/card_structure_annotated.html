<div style="opacity: 1; transform: none;">

        <div data-rarity="wowa-holo" class="sc-jMsorb geYpbC floating" style="--effect-intensity: 0; --h: 58; --s: 70; --l: 50; --space: 4; --shineColor1: rgba(255, 0, 0, 0.5); --shineColor2: rgba(0, 146, 255, 0.5); --shineColor3: rgba(255, 0, 255, 0.5); --shineOffset1: 20%; --shineOffset2: 40%; --shineOffset3: 60%; --imageShineIntensity: 0.95; --aberrationIntensity: -0.07; --aberrationSpeed: 9s;">

            <div class="sc-dcKlJK hSvaQB">

                <div class="sc-jPkiSJ iNNCAj" style="--card-gradient: linear-gradient(142deg, hsl(58, 75.83585582231844%, 40.17525999443502%), hsl(118, 86.28643551136922%, 35.81382476032974%), hsl(238, 76.32284123608378%, 44.32522225458986%));">

<!--
Component Hierarchy Summary:

1. Scene Container
   - CardScene: The main perspective container (3D space for the card)

2. Card Container
   - CardContainer: Handles hover states, animations, and cursor interaction
     - Has data-rarity attribute that controls which holographic effects are applied
     - Contains various CSS variables (--effect-intensity, etc.) for visual effects

3. Edge and Border Elements
   - EdgeHighlight: Outer glow/highlight effect around the card edges
   - CardBorder: Thick integrated border (Pokemon style)
   - CardBorderImage: Blurred image border overlay
   - ThinEdgeBorder: Subtle edge border simulating paper edge

4. Card Face Elements
   - CardElement: Container for front and back faces
     - CardFace: Front of the card with all visual elements
       - DepthLayer: Creates 3D effect
       - PatternOverlay: Background patterns (grids, dots, etc.)
       - CardImage: Main card illustration container
       - Various holographic effects:
         - HoloEffect: Base holographic gradient layer
         - ImageShine: Shine effect on top of the image
         - HoloShine variants: Different holographic styles based on card rarity
         - WowaHolo: Special holographic effect for specific rarity range (0.85-0.9)
       - ChromaticAberration: Color separation effect
       - TimeSymbol: Day/Night indicator (if applicable)
     - CardBack: Back of the card (shown when flipped)

5. Special Effects
   - CustomHoloEffect: For custom uploaded holographic patterns
   - ImageMask: Controls vignetting and fade effects on the card image

The interactive card responds to mouse movements by:
- Tracking mouse position relative to the card
- Applying 3D rotation effects
- Adjusting holographic shine intensity and direction 
- Modifying CSS variables to control visual effects
-->
